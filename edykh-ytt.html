<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Tracker — edykh</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eef7fd;
    --panel: rgba(255,255,255,0.5);
    --border: rgba(56,168,232,0.18);
    --accent: #38a8e8;
    --accent-dark: #1a6fa0;
    --text: #0d2a3d;
    --text-mid: #3a6a8a;
    --text-soft: #7aaabb;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--sans);
    background: linear-gradient(160deg, #dff2fd 0%, #c5e8f8 50%, #a8d8f0 100%);
    color: var(--text);
  }

  /* subtle grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(56,168,232,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,168,232,0.07) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    max-width: 1260px;
    margin: 0 auto;
    display: grid;
    grid-template-rows: 56px auto 44px;
    grid-template-columns: 1fr 220px;
    grid-template-areas:
      "header header"
      "video sidebar"
      "footer footer";
    gap: 10px;
    padding: 16px 20px;
  }

  /* ── header ── */
  header {
    grid-area: header;
    display: flex; align-items: center; justify-content: flex-start;
  }
  .h-left {
    display: flex; align-items: center; gap: 12px;
  }
  .h-center {
    display: flex; align-items: center; gap: 10px;
    margin: 0 auto;
  }
  .brand-logo {
    width: 24px; height: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff;
    font-family: var(--mono);
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .h-label {
    font-family: var(--mono);
    font-size: 13px; font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-mid);
  }
  .live-chip {
    display: flex; align-items: center; gap: 6px;
    border: 1px solid rgba(220,50,50,0.25);
    border-radius: 5px;
    padding: 4px 9px;
    background: rgba(220,50,50,0.06);
  }
  .live-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: #d03030;
    animation: blink 1.3s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .live-chip span {
    font-family: var(--mono);
    font-size: 9px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    color: #a02020;
  }
  .h-center {
    display: flex; align-items: center; gap: 10px;
    margin: 0 auto;
    font-family: var(--mono);
    font-size: 14px; color: var(--text-soft);
    letter-spacing: 0.5px;
  }
  .h-center span { white-space: nowrap; }
  #clock {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent-dark);
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(56,168,232,0.12);
  }
  .credit-by {
    font-family: var(--mono);
    font-size: 12px; font-weight: 500;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text-soft);
  }
  .credit-name {
    font-family: var(--mono);
    font-size: 14px; font-weight: 700;
    color: var(--accent-dark);
  }

  /* ── video section ── */
  .video-section {
    grid-area: video;
    display: flex; flex-direction: column; gap: 8px;
    min-height: 0;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .video-panel {
    flex: 1; min-height: 0;
    max-height: 485px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .video-wrap {
    aspect-ratio: 16 / 9;
    position: relative; background: #000;
    border-radius: 11px 11px 0 0;
    overflow: hidden;
  }
  .video-wrap iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%; border: none;
  }
  .video-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  #vidTitle {
    font-size: 14px; font-weight: 600;
    color: var(--text-mid);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 72%;
  }
  .err-msg { font-family: var(--mono); font-size: 10px; color: #b02020; }

  /* stats row */
  .stats-row {
    padding: 11px 13px;
    display: flex; align-items: stretch; gap: 11px;
    flex-shrink: 0;
  }
  .stat-block { flex: 1; }
  .stat-block + .stat-block {
    border-left: 1px solid var(--border);
    padding-left: 13px;
    margin-left: 13px;
  }
  .stat-block:first-child {
    background: rgba(56,168,232,0.08);
    border-radius: 11px;
    padding: 13px;
  }
  .stat-block:first-child .slabel {
    color: var(--text);
  }
  .slabel {
    font-family: var(--mono);
    font-size: 10px; font-weight: 600;
    letter-spacing: 1.1px; text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 4px;
  }
  .sval {
    font-family: var(--mono);
    font-size: 22px; font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
    transition: color 0.3s;
  }
  .sval.bump {
    color: #1a8a3a;
    animation: pulse 0.55s ease;
  }
  .sdelta {
    font-family: var(--mono);
    font-size: 16px; color: #1f8b33;
    margin-top: 8px;
    font-weight: 900;
    letter-spacing: 0.08em;
    padding: 6px 11px;
    border-radius: 999px;
    background: rgba(42,127,51,0.18);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 0 0 1px rgba(42,127,51,0.16);
  }
  .sdelta.up {
    color: #1a8a3a;
    animation: pulse 0.55s ease;
    background: rgba(42,127,51,0.22);
  }
  @keyframes pulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.16); }
    60% { transform: scale(0.98); }
    100% { transform: scale(1); }
  }
  .refresh-block {
    display: flex; flex-direction: column;
    justify-content: space-between;
    gap: 10px;
    background: rgba(56,168,232,0.1);
    border-radius: 12px;
    padding: 12px;
  }
  .refresh-block .side-label {
    margin-bottom: 0;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.1px;
    color: var(--text);
  }
  #countdownNum {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent-dark);
  }
  .refresh-bar-wrap { margin-top: 8px; }
  .side-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-mid);
  }

  /* ── sidebar ── */
  .sidebar {
    grid-area: sidebar;
    display: flex; flex-direction: column; gap: 8px;
    min-height: 0;
  }
  .side-panel { padding: 8px 10px; }
  .side-label {
    font-family: var(--mono);
    font-size: 11px; font-weight: 500;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text-soft); margin-bottom: 6px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .side-val {
    font-family: var(--mono);
    font-size: 22px; font-weight: 600;
    color: var(--text); letter-spacing: -0.4px;
  }
  .side-sub {
    font-family: var(--mono);
    font-size: 9px; color: var(--text-soft);
    margin-top: 3px;
  }
  .social-panel {
    display: flex; flex-direction: column; gap: 10px;
  }
  .social-title {
    font-family: var(--mono);
    font-size: 10px; font-weight: 600;
    letter-spacing: 1.4px; text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 8px;
  }
  .social-buttons {
    display: flex; gap: 8px;
  }
  .social-button {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 12px;
    font-family: var(--mono);
    font-size: 12px; font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
  }
  .social-button.ig { background: #e4405f; }
  .social-icon {
    width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center;
  }

  /* refresh bar */
  .bar-track {
    height: 5px; background: rgba(56,168,232,0.22);
    border-radius: 100px; overflow: hidden; margin-top: 8px;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-dark));
    border-radius: 100px; width: 0%;
    transition: width 0.5s linear;
  }

  /* ── footer / credit ── */
  footer {
    grid-area: footer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .h-center {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono);
    font-size: 14px; color: var(--text);
  }
  .credit-by {
    font-family: var(--mono);
    font-size: 13px; font-weight: 700;
    letter-spacing: 1.3px; text-transform: uppercase;
    color: var(--text);
  }
  .credit-name {
    font-family: var(--mono);
    font-size: 18px; font-weight: 900;
    color: var(--accent-dark);
    letter-spacing: 1px;
  }
  .credit-dot {
    width: 3px; height: 3px; border-radius: 50%;
    background: var(--text-soft);
  }
  .credit-api {
    font-family: var(--mono);
    font-size: 9px; color: var(--text-soft);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="h-left">
      <span class="brand-logo">VT</span>
      <span class="h-label">View Tracker</span>
      <div class="live-chip"><div class="live-dot"></div><span>Live</span></div>
    </div>
    <div class="h-center">
      <span id="clock">—</span>
      <span class="credit-by">Created by</span>
      <span class="credit-name">Edykh</span>
    </div>
  </header>

  <div class="video-section">
    <div class="panel video-panel">
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/EDliuALaUm0?rel=0" allowfullscreen title="YouTube video"></iframe>
      </div>
      <div class="video-footer">
        <div id="vidTitle">Loading…</div>
        <div class="err-msg" id="errMsg"></div>
      </div>
    </div>

    <div class="panel stats-row">
      <div class="stat-block">
        <div class="slabel">Views</div>
        <div class="sval" id="viewCount">—</div>
        <div class="sdelta" id="viewDelta">fetching…</div>
      </div>
      <div class="stat-block refresh-block">
        <div class="side-label">
          <span>Refresh</span>
          <span id="countdownNum">30s</span>
        </div>
        <div class="refresh-bar-wrap"><div class="bar-track"><div class="bar-fill" id="refreshBar"></div></div></div>
        <div class="side-sub">Updated: <span id="lastUpdate">—</span></div>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="panel side-panel">
      <div class="side-label">Likes</div>
      <div class="side-val" id="sideLikes">—</div>
    </div>
    <div class="panel side-panel">
      <div class="side-label">Comments</div>
      <div class="side-val" id="sideComments">—</div>
    </div>
    <div class="panel side-panel social-panel">
      <div class="social-title">Follow Us</div>
      <div class="social-buttons">
        <a class="social-button ig" href="https://instagram.com" target="_blank" rel="noreferrer">
          <span class="social-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.75 2H16.25C19.2 2 21.5 4.3 21.5 7.25V16.75C21.5 19.7 19.2 22 16.25 22H7.75C4.8 22 2.5 19.7 2.5 16.75V7.25C2.5 4.3 4.8 2 7.75 2Z" stroke="white" stroke-width="1.8"/>
              <path d="M12 7.2C9.4 7.2 7.2 9.4 7.2 12C7.2 14.6 9.4 16.8 12 16.8C14.6 16.8 16.8 14.6 16.8 12C16.8 9.4 14.6 7.2 12 7.2Z" stroke="white" stroke-width="1.8"/>
              <path d="M17.8 6.2H17.81" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          Instagram
        </a>
      </div>
    </div>
  </div>

  <footer>
    <span class="credit-api">YouTube Data API v3</span>
  </footer>

</div>
<script>
const API_KEY = 'AIzaSyA-he9jY9Gay1VBe0nNfv2W6ED6JNRI4Go';
const VIDEO_ID = 'EDliuALaUm0';
const INTERVAL = 30;
let prevViews = null, countdown = INTERVAL, timerInterval;

function fmt(n) { return n ? parseInt(n).toLocaleString('en-US') : '—'; }

function tickClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
tickClock();
setInterval(tickClock, 1000);

async function fetchStats() {
  try {
    const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet&id=${VIDEO_ID}&key=${API_KEY}`);
    const data = await res.json();
    if (data.error) { document.getElementById('errMsg').textContent = data.error.message; return; }
    const item = data.items?.[0];
    if (!item) { document.getElementById('errMsg').textContent = 'Not found'; return; }
    const s = item.statistics;
    const views = parseInt(s.viewCount);

    const el = document.getElementById('viewCount');
    el.textContent = fmt(views);
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 500);

    const d = document.getElementById('viewDelta');
    if (prevViews !== null && views > prevViews) {
      d.textContent = '+' + fmt(views - prevViews);
      d.classList.add('up');
    } else { d.textContent = 'up to date'; d.classList.remove('up'); }
    prevViews = views;

    document.getElementById('vidTitle').textContent = item.snippet.title;
    document.getElementById('sideLikes').textContent = fmt(s.likeCount);
    document.getElementById('sideComments').textContent = fmt(s.commentCount);
    document.getElementById('lastUpdate').textContent =
      new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('errMsg').textContent = '';
  } catch(e) { document.getElementById('errMsg').textContent = 'Connection error'; }
}

function startCountdown() {
  countdown = INTERVAL; clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    countdown--;
    if (countdown <= 0) countdown = INTERVAL;
    document.getElementById('refreshBar').style.width = ((INTERVAL - countdown) / INTERVAL * 100) + '%';
    document.getElementById('countdownNum').textContent = countdown + 's';
  }, 1000);
}

function refresh() { fetchStats(); startCountdown(); }
refresh();
setInterval(refresh, INTERVAL * 1000);
</script>
</body>
</html>
