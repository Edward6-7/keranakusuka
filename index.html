<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>View Tracker — edykh</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eef7fd;
    --panel: rgba(255,255,255,0.5);
    --border: rgba(56,168,232,0.18);
    --accent: #38a8e8;
    --accent-dark: #1a6fa0;
    --text: #0d2a3d;
    --text-mid: #3a6a8a;
    --text-soft: #7aaabb;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; }
  body {
    font-family: var(--sans);
    background: linear-gradient(160deg, #dff2fd 0%, #c5e8f8 50%, #a8d8f0 100%);
    color: var(--text);
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(56,168,232,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,168,232,0.07) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ═══════════════ DESKTOP ═══════════════ */
  .page {
    position: relative; z-index: 1;
    max-width: 1260px; margin: 0 auto;
    display: grid;
    grid-template-rows: 56px 1fr 44px;
    grid-template-columns: 1fr 250px;
    grid-template-areas: "header header" "video sidebar" "footer footer";
    gap: 10px; padding: 16px 20px; min-height: 100vh;
  }
  header { grid-area: header; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
  .video-section { grid-area: video; display: flex; flex-direction: column; gap: 8px; }
  .sidebar { grid-area: sidebar; display: flex; flex-direction: column; gap: 8px; min-height: 0; }
  footer { grid-area: footer; display: flex; align-items: center; justify-content: center; }

  /* ═══════════════ MOBILE ═══════════════ */
  @media (max-width: 700px) {
    html, body { height: 100vh; overflow: hidden; }

    .page {
      height: 100vh;
      display: flex; flex-direction: column;
      padding: 6px 8px; gap: 5px;
    }

    /* header: single line, compact */
    header { height: 32px; flex-wrap: nowrap; gap: 6px; overflow: hidden; }
    .h-label { font-size: 10px !important; letter-spacing: 1px; }
    .live-chip { padding: 3px 6px; }
    .live-chip span { font-size: 8px; }
    #clock { font-size: 12px !important; padding: 2px 6px !important; }
    .h-center { gap: 5px; }
    .h-center .credit-by, .h-center .credit-name { display: none; }

    /* video: fixed 16:9 based on screen width */
    .video-section { flex: 0 0 auto; gap: 4px; }
    .video-panel { flex: 0 0 auto; }
    .video-wrap { aspect-ratio: 16/9; width: 100%; }
    .video-footer { padding: 4px 8px; }
    #vidTitle { font-size: 10px; }

    /* stats panel */
    .stats-row { flex: 0 0 auto; padding: 6px 8px; }
    .stat-block:first-child { padding: 6px 8px !important; }
    .slabel { font-size: 8px !important; margin-bottom: 2px !important; }
    .sval { font-size: 20px !important; }
    .sdelta { font-size: 11px !important; padding: 2px 7px !important; margin-top: 2px !important; }
    #sparkWrap { margin-top: 4px; padding-top: 4px; }
    .spark-canvas-wrap { height: 38px !important; }
    #sparkCanvas { height: 38px !important; }
    .spark-title { font-size: 7px; }
    #trendBadge { font-size: 8px; padding: 1px 5px; }
    #xLabels { font-size: 7px; margin-top: 2px; }

    /* inline refresh visible */
    #inlineRefresh { display: flex !important; }

    /* sidebar: 2-col, auto height, no stretch */
    .sidebar { flex: 0 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .sidebar .side-panel { padding: 6px 8px; }
    .side-label { font-size: 8px !important; margin-bottom: 2px !important; }
    .side-val { font-size: 15px !important; }
    .sidebar .refresh-block { display: none !important; }
    .sidebar .social-panel { grid-column: span 2; padding: 5px 8px; }
    .social-title { font-size: 8px !important; margin-bottom: 3px !important; }
    .social-button { padding: 5px 8px; font-size: 9px; }

    footer { display: none; }
  }

  /* ═══════════════ SHARED COMPONENTS ═══════════════ */
  .h-left { display: flex; align-items: center; gap: 12px; }
  .brand-logo {
    width: 24px; height: 24px; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff; font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.8px; text-transform: uppercase;
  }
  .h-label { font-family: var(--mono); font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-mid); }
  .live-chip { display: flex; align-items: center; gap: 6px; border: 1px solid rgba(220,50,50,0.25); border-radius: 5px; padding: 4px 9px; background: rgba(220,50,50,0.06); }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #d03030; animation: blink 1.3s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .live-chip span { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #a02020; }
  .h-center { display: flex; align-items: center; gap: 10px; margin: 0 auto; font-family: var(--mono); font-size: 14px; color: var(--text-soft); letter-spacing: 0.5px; }
  .h-center span { white-space: nowrap; }
  #clock { font-size: 18px; font-weight: 700; color: var(--accent-dark); padding: 4px 10px; border-radius: 999px; background: rgba(56,168,232,0.12); }
  .credit-by { font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-soft); }
  .credit-name { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--accent-dark); }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
  .video-panel { flex: 0 0 auto; display: flex; flex-direction: column; overflow: hidden; }
  .video-wrap { position: relative; background: #000; border-radius: 11px 11px 0 0; overflow: hidden; width: 100%; aspect-ratio: 16/9; }
  .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  .video-footer { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #vidTitle { font-size: 14px; font-weight: 600; color: var(--text-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 72%; }
  .err-msg { font-family: var(--mono); font-size: 10px; color: #b02020; }

  .stats-row { padding: 10px 14px; display: flex; align-items: stretch; gap: 11px; flex-shrink: 0; }
  .stat-block { flex: 1; }
  .stat-block:first-child { background: rgba(56,168,232,0.08); border-radius: 11px; padding: 10px; }
  .stat-block:first-child .slabel { color: var(--text); }
  .slabel { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 1.1px; text-transform: uppercase; color: var(--text-mid); margin-bottom: 3px; }
  .sval { font-family: var(--mono); font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -1px; transition: color 0.3s; line-height: 1.1; }
  .sval.bump { color: #1a8a3a; animation: pulse 0.55s ease; }
  .sdelta { font-family: var(--mono); font-size: 20px; font-weight: 900; margin-top: 6px; letter-spacing: -0.5px; padding: 5px 13px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; color: var(--text-soft); background: rgba(56,168,232,0.08); box-shadow: inset 0 0 0 1px rgba(56,168,232,0.15); }
  .sdelta.up { color: #1a8a3a; background: rgba(42,127,51,0.18); box-shadow: inset 0 0 0 1px rgba(42,127,51,0.22); animation: pulse 0.55s ease; }
  @keyframes pulse { 0%{transform:scale(1)} 30%{transform:scale(1.16)} 60%{transform:scale(0.98)} 100%{transform:scale(1)} }

  #sparkWrap { margin-top: 7px; padding-top: 7px; border-top: 1px solid rgba(56,168,232,0.2); }
  .spark-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .spark-title { font-family: var(--mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-mid); }
  #trendBadge { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 99px; background: rgba(42,127,51,0.15); color: #1a8a3a; }
  .spark-canvas-wrap { position: relative; width: 100%; height: 55px; }
  #sparkCanvas { display: block; }
  #xLabels { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 8px; color: var(--text-soft); margin-top: 4px; overflow: hidden; }
  #xLabels span { flex: 1; text-align: center; white-space: nowrap; overflow: hidden; }

  /* views row — default stacked, mobile side by side */
  #viewsRow {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #viewsLeft { display: flex; flex-direction: column; }

  /* inline refresh — hidden desktop, flex mobile */
  #inlineRefresh {
    display: none;
    align-items: center; gap: 8px;
  }
  #inlineRefresh .ilabel { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-mid); margin-bottom: 2px; }
  #inlineRefresh .itime { font-family: var(--mono); font-size: 9px; color: var(--text-soft); }

  .side-panel { padding: 12px 14px; flex-shrink: 0; }
  .side-label { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-soft); margin-bottom: 6px; }
  .side-val { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.4px; }

  .social-panel { flex-shrink: 0; padding: 10px 14px; display: flex; flex-direction: column; gap: 10px; }
  .social-title { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--text-mid); margin-bottom: 6px; }
  .social-buttons { display: flex; gap: 8px; }
  .social-button { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 10px; border-radius: 8px; font-family: var(--mono); font-size: 11px; font-weight: 600; color: #ffffff; text-transform: uppercase; text-decoration: none; }
  .social-button.ig { background: #e4405f; }
  .social-icon { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; }

  .refresh-block { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 14px 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); flex-shrink: 0; }
  .ring-wrap { position: relative; width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; }
  .ring-svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(56,168,232,0.15); stroke-width: 5; }
  .ring-arc { fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round; stroke-dasharray: 188.5; stroke-dashoffset: 188.5; transition: stroke-dashoffset 0.5s linear; }
  .ring-inner { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #countdownNum { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--accent-dark); letter-spacing: -1px; line-height: 1; }
  .ring-sub { font-family: var(--mono); font-size: 8px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-soft); }
  .refresh-label-row { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-mid); }
  .side-sub { font-family: var(--mono); font-size: 9px; color: var(--text-soft); text-align: center; }
  .bar-track { display: none; }
  .bar-fill  { display: none; }

  .credit-api { font-family: var(--mono); font-size: 9px; color: var(--text-soft); letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="h-left">
      <span class="brand-logo">VT</span>
      <span class="h-label">View Tracker</span>
      <div class="live-chip"><div class="live-dot"></div><span>Live</span></div>
    </div>
    <div class="h-center">
      <span id="clock">—</span>
      <span class="credit-by">Created by</span>
      <span class="credit-name">Edykh</span>
    </div>
  </header>

  <div class="video-section">
    <div class="panel video-panel">
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/EDliuALaUm0?rel=0" allowfullscreen title="YouTube video"></iframe>
      </div>
      <div class="video-footer">
        <div id="vidTitle">Loading…</div>
        <div class="err-msg" id="errMsg"></div>
      </div>
    </div>

    <div class="panel stats-row">
      <div class="stat-block">
        <div class="slabel">Views</div>
        <!-- views row: number + inline refresh side by side on mobile -->
        <div id="viewsRow">
          <div id="viewsLeft">
            <div class="sval" id="viewCount">—</div>
            <div class="sdelta" id="viewDelta"></div>
          </div>
          <!-- inline refresh: only visible on mobile -->
          <div id="inlineRefresh">
            <div style="position:relative;width:56px;height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
              <svg style="position:absolute;inset:0;transform:rotate(-90deg);" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
                <circle fill="none" stroke="rgba(56,168,232,0.15)" stroke-width="5" cx="36" cy="36" r="30"/>
                <circle fill="none" stroke="#38a8e8" stroke-width="5" stroke-linecap="round"
                  stroke-dasharray="188.5" stroke-dashoffset="188.5"
                  cx="36" cy="36" r="30" id="ringArc2"
                  style="transition:stroke-dashoffset 0.5s linear;"/>
              </svg>
              <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;">
                <span id="countdownNum2" style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent-dark);letter-spacing:-1px;line-height:1;">30s</span>
                <span style="font-family:var(--mono);font-size:7px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-soft);">next</span>
              </div>
            </div>
            <div>
              <div class="ilabel">Refresh</div>
              <div class="itime" id="lastUpdate2">—</div>
            </div>
          </div>
        </div>

        <div id="sparkWrap">
          <div class="spark-header">
            <span class="spark-title">12h trend</span>
            <span id="trendBadge">loading…</span>
          </div>
          <div class="spark-canvas-wrap">
            <canvas id="sparkCanvas" role="img" aria-label="View count trend over the last 12 hours"></canvas>
          </div>
          <div id="xLabels"></div>
        </div>

      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="panel side-panel">
      <div class="side-label">Likes</div>
      <div class="side-val" id="sideLikes">—</div>
    </div>
    <div class="panel side-panel">
      <div class="side-label">Comments</div>
      <div class="side-val" id="sideComments">—</div>
    </div>
    <div class="panel refresh-block">
      <div class="refresh-label-row">Refresh</div>
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring-track" cx="36" cy="36" r="30"/>
          <circle class="ring-arc"   cx="36" cy="36" r="30" id="ringArc"/>
        </svg>
        <div class="ring-inner">
          <span id="countdownNum">30s</span>
          <span class="ring-sub">next</span>
        </div>
      </div>
      <div class="side-sub" id="lastUpdate">—</div>
      <div class="bar-track"><div class="bar-fill" id="refreshBar"></div></div>
    </div>
    <div class="panel side-panel social-panel">
      <div class="social-title">Follow me for cookies 🍪</div>
      <div class="social-buttons">
        <a class="social-button ig" href="https://www.instagram.com/edward_0729/" target="_blank" rel="noreferrer">
          <span class="social-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.75 2H16.25C19.2 2 21.5 4.3 21.5 7.25V16.75C21.5 19.7 19.2 22 16.25 22H7.75C4.8 22 2.5 19.7 2.5 16.75V7.25C2.5 4.3 4.8 2 7.75 2Z" stroke="white" stroke-width="1.8"/>
              <path d="M12 7.2C9.4 7.2 7.2 9.4 7.2 12C7.2 14.6 9.4 16.8 12 16.8C14.6 16.8 16.8 14.6 16.8 12C16.8 9.4 14.6 7.2 12 7.2Z" stroke="white" stroke-width="1.8"/>
              <path d="M17.8 6.2H17.81" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          Instagram
        </a>
      </div>
      <div id="mobileCredit" style="font-family:var(--mono);font-size:9px;color:var(--text-soft);text-align:center;margin-top:4px;letter-spacing:0.8px;">
        Created by <span style="color:var(--accent-dark);font-weight:700;">Edykh</span>
      </div>
    </div>
  </div>

  <footer>
    <span class="credit-api">YouTube Data API v3</span>
  </footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API_KEY  = 'AIzaSyA-he9jY9Gay1VBe0nNfv2W6ED6JNRI4Go';
const VIDEO_ID = 'EDliuALaUm0';
const INTERVAL = 30;
const LS_KEY   = 'vt_history_' + VIDEO_ID;

let prevViews = null, countdown = INTERVAL, timerInterval;
let viewHistory = [], sparkChart = null;

// ── Safe storage helpers (localStorage with sessionStorage fallback) ──
function storageSave(key, value) {
  try { localStorage.setItem(key, value); return; } catch(e) {}
  try { sessionStorage.setItem(key, value); } catch(e) {}
}
function storageLoad(key) {
  try {
    const v = localStorage.getItem(key);
    if (v !== null) return v;
  } catch(e) {}
  try { return sessionStorage.getItem(key); } catch(e) {}
  return null;
}

function loadHistory() {
  try {
    const raw = storageLoad(LS_KEY);
    if (!raw) return;
    const cutoff = Date.now() - 12 * 3600 * 1000;
    viewHistory = JSON.parse(raw)
      .filter(p => p.t >= cutoff)
      .map(p => ({ t: new Date(p.t), v: p.v }));
  } catch(e) { viewHistory = []; }
}

function saveHistory() {
  try {
    const cutoff = Date.now() - 12 * 3600 * 1000;
    storageSave(LS_KEY, JSON.stringify(
      viewHistory.filter(p => p.t.getTime() >= cutoff).map(p => ({ t: p.t.getTime(), v: p.v }))
    ));
  } catch(e) {}
}

function fmt(n)    { return n ? parseInt(n).toLocaleString('en-US') : '—'; }
function fmtNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000)    return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString('en-US');
}
function fmtT(d) {
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function tickClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
tickClock();
setInterval(tickClock, 1000);

function pushHistory(views) {
  const now = new Date();
  // Bucket into 30-min slots: only add a new point if last point is >30min ago
  const BUCKET = 60 * 60 * 1000; // 60 minutes in ms
  const last = viewHistory[viewHistory.length - 1];
  if (!last || (now.getTime() - last.t.getTime()) >= BUCKET) {
    viewHistory.push({ t: now, v: views });
  } else {
    // Update the latest bucket with newest value
    viewHistory[viewHistory.length - 1].v = views;
  }
  const cutoff = new Date(Date.now() - 11 * BUCKET); // keep 11 points = 11h window
  viewHistory = viewHistory.filter(p => p.t >= cutoff);
  saveHistory();
  renderSpark();
}

function renderSpark() {
  const canvas = document.getElementById('sparkCanvas');
  if (!canvas) return;
  const wrap = canvas.parentElement;
  const W = wrap.clientWidth || 240;
  canvas.width = W; canvas.height = 55;
  canvas.style.width = W + 'px'; canvas.style.height = '55px';

  const labels = viewHistory.map(p => fmtT(p.t));
  const vals   = viewHistory.map(p => p.v);

  if (sparkChart) { sparkChart.destroy(); sparkChart = null; }

  sparkChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: vals,
        borderColor: '#38a8e8', borderWidth: 2,
        pointRadius: viewHistory.length <= 8 ? 3 : 0,
        pointHoverRadius: 5,
        pointBackgroundColor: '#38a8e8',
        fill: true, backgroundColor: 'rgba(56,168,232,0.13)', tension: 0.38
      }]
    },
    options: {
      responsive: false, animation: { duration: 350 },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => fmtNum(ctx.parsed.y) + ' views' } }
      },
      scales: {
        x: { display: false },
        y: {
          display: true, position: 'right',
          grid: { color: 'rgba(56,168,232,0.12)' },
          ticks: {
            color: '#7aaabb',
            font: { size: 9, family: "'IBM Plex Mono', monospace" },
            maxTicksLimit: 3, callback: v => fmtNum(v)
          },
          border: { display: false }
        }
      }
    }
  });

  const el = document.getElementById('xLabels');
  if (el && viewHistory.length >= 2) {
    const count = Math.min(11, viewHistory.length);
    const step  = (viewHistory.length - 1) / (count - 1);
    const idxs  = Array.from({ length: count }, (_, i) => Math.round(i * step));
    el.innerHTML = idxs.map(i => `<span>${fmtT(viewHistory[i].t)}</span>`).join('');
  }

  const badge = document.getElementById('trendBadge');
  if (badge) {
    if (viewHistory.length >= 2) {
      const delta = vals[vals.length - 1] - vals[0];
      if (delta > 0) {
        badge.textContent = '+' + fmtNum(delta);
        badge.style.background = 'rgba(42,127,51,0.15)'; badge.style.color = '#1a8a3a';
      } else if (delta < 0) {
        badge.textContent = fmtNum(delta);
        badge.style.background = 'rgba(180,30,30,0.10)'; badge.style.color = '#b02020';
      } else {
        badge.textContent = 'no change';
        badge.style.background = 'rgba(56,168,232,0.12)'; badge.style.color = '#1a6fa0';
      }
    } else {
      badge.textContent = 'collecting…';
      badge.style.background = 'rgba(56,168,232,0.08)'; badge.style.color = '#7aaabb';
    }
  }
}

async function fetchStats() {
  try {
    const res  = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet&id=${VIDEO_ID}&key=${API_KEY}`);
    const data = await res.json();
    if (data.error) { document.getElementById('errMsg').textContent = data.error.message; return; }
    const item = data.items?.[0];
    if (!item)   { document.getElementById('errMsg').textContent = 'Not found'; return; }

    const s     = item.statistics;
    const views = parseInt(s.viewCount);

    const el = document.getElementById('viewCount');
    el.textContent = fmt(views);
    el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 500);

    const d = document.getElementById('viewDelta');
    if (prevViews !== null && views > prevViews) {
      d.textContent = '+' + fmt(views - prevViews);
      d.classList.add('up');
    }
    prevViews = views;

    document.getElementById('vidTitle').textContent     = item.snippet.title;
    document.getElementById('sideLikes').textContent    = fmt(s.likeCount);
    document.getElementById('sideComments').textContent = fmt(s.commentCount);
    const timeStr = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('lastUpdate').textContent  = timeStr;
    const lu2 = document.getElementById('lastUpdate2');
    if (lu2) lu2.textContent = timeStr;

    pushHistory(views);
  } catch(e) { document.getElementById('errMsg').textContent = 'Connection error'; }
}

function startCountdown() {
  countdown = INTERVAL; clearInterval(timerInterval);
  const arc  = document.getElementById('ringArc');
  const arc2 = document.getElementById('ringArc2');
  const circumference = 188.5;
  timerInterval = setInterval(() => {
    countdown--;
    if (countdown <= 0) countdown = INTERVAL;
    const progress = (INTERVAL - countdown) / INTERVAL;
    if (arc)  arc.style.strokeDashoffset  = circumference * (1 - progress);
    if (arc2) arc2.style.strokeDashoffset = circumference * (1 - progress);
    document.getElementById('countdownNum').textContent = countdown + 's';
    const cn2 = document.getElementById('countdownNum2');
    if (cn2) cn2.textContent = countdown + 's';
  }, 1000);
}

loadHistory();
if (viewHistory.length > 0) renderSpark();
fetchStats();
startCountdown();
setInterval(() => { fetchStats(); startCountdown(); }, INTERVAL * 1000);
</script>
